name: dyff

services:
  dyff:
    container_name: dyff-app
    image: dyffs/dyff:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEPLOYMENT_MODE: self_hosted
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: dyff
      DB_PASSWORD: dyff
      DB_NAME: dyff
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${DYFF_PORT:-3000}:80"
    volumes:
      - git_data:/data/git_repos
      - asset_data:/data/github_assets
      - dyff_logs:/var/log/dyff
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dyff
      POSTGRES_PASSWORD: dyff
      POSTGRES_DB: dyff
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dyff -d dyff"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  postgres_data:
  git_data:
  asset_data:
  dyff_logs:
